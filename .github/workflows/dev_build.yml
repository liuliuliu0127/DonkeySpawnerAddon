name: Publish Development Build

on:
  push:
    branches:
      - main          # 只在推送到 main 分支时触发
      # - master      # 如果默认分支是 master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 仍然保留，PAT 也需要此权限

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Build with Gradle
        run: ./gradlew build

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}   # 改用 PAT
          tag_name: snapshot
          name: Dev Build
          prerelease: true
          files: |
            ./build/libs/*.jar
          overwrite_files: true   # 建议添加，避免已存在文件时失败